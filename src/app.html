<!doctype html>
<html lang="en" class="scroll-smooth">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		
		<!-- Preconnect to Font Origins -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		
		<!-- High Priority Preload for the CSS file itself -->
		<link 
			rel="preload" 
			as="style" 
			href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Space+Grotesk:wght@300..700&display=swap" 
		/>
		<link 
			rel="preload" 
			as="style" 
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" 
		/>

		<!-- Asynchronous Font Loading -->
		<link 
			href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Space+Grotesk:wght@300..700&display=swap" 
			rel="stylesheet"
			media="print" 
			onload="this.media='all'"
		/>
		<link 
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" 
			rel="stylesheet"
			media="print" 
			onload="this.media='all'"
		/>

		<!-- Fallback for no-JS -->
		<noscript>
			<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
			<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
		</noscript>

		%sveltekit.head%
	</head>
	<body class="bg-background text-on-surface font-body antialiased" data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
